<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f3d35">
  <meta name="description" content="GRADUS, web-app personal para la gestión del Grado en Pedagogía UNED.">
  <title>GRADUS · Pedagogía UNED</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Navegación principal">
      <div class="brand-block">
        <div class="brand-mark" aria-hidden="true">G</div>
        <div>
          <h1>GRADUS</h1>
          <p>Pedagogía UNED · 2026-2027</p>
        </div>
      </div>
      <nav class="main-nav" id="mainNav">
        <button class="nav-item active" data-view="inicio"><span>⌂</span>Inicio</button>
        <button class="nav-item" data-view="calendario"><span>□</span>Calendario</button>
        <button class="nav-item" data-view="asignaturas"><span>◫</span>Asignaturas</button>
        <button class="nav-item" data-view="materiales"><span>▤</span>Materiales</button>
        <button class="nav-item" data-view="examenes"><span>◇</span>Exámenes</button>
        <button class="nav-item" data-view="simulacros"><span>◎</span>Simulacros</button>
        <button class="nav-item" data-view="progreso"><span>◉</span>Progreso</button>
        <button class="nav-item" data-view="ajustes"><span>⚙</span>Ajustes</button>
      </nav>
      <div class="version-pill">Versión 0.1</div>
    </aside>

    <main class="content-area">
      <header class="topbar">
        <div>
          <p class="eyebrow">Panel de dirección académica</p>
          <h2 id="viewTitle">Inicio</h2>
        </div>
        <button id="quickAddBtn" class="primary-action">+ Añadir fecha</button>
      </header>

      <section id="inicio" class="view active-view" aria-labelledby="viewTitle"></section>
      <section id="calendario" class="view" aria-labelledby="viewTitle"></section>
      <section id="asignaturas" class="view" aria-labelledby="viewTitle"></section>
      <section id="materiales" class="view" aria-labelledby="viewTitle"></section>
      <section id="examenes" class="view" aria-labelledby="viewTitle"></section>
      <section id="simulacros" class="view" aria-labelledby="viewTitle"></section>
      <section id="progreso" class="view" aria-labelledby="viewTitle"></section>
      <section id="ajustes" class="view" aria-labelledby="viewTitle"></section>
    </main>
  </div>

  <dialog id="eventDialog" class="modal-card">
    <form method="dialog" id="eventForm">
      <div class="modal-header">
        <h3>Añadir fecha importante</h3>
        <button class="icon-button" value="cancel" aria-label="Cerrar">×</button>
      </div>
      <div class="form-grid">
        <label>Título
          <input name="title" type="text" required placeholder="PEC, examen, tutoría...">
        </label>
        <label>Asignatura
          <select name="subjectId" id="eventSubjectSelect" required></select>
        </label>
        <label>Tipo
          <select name="type" required>
            <option value="Entrega">Entrega</option>
            <option value="Examen">Examen</option>
            <option value="Tutoría">Tutoría</option>
            <option value="Repaso">Repaso</option>
            <option value="Aviso">Aviso</option>
          </select>
        </label>
        <label>Fecha
          <input name="date" type="date" required>
        </label>
        <label class="span-2">Notas
          <textarea name="notes" rows="3" placeholder="Criterios, enlace, observaciones..."></textarea>
        </label>
      </div>
      <div class="modal-actions">
        <button value="cancel" class="secondary-button">Cancelar</button>
        <button value="default" class="primary-action">Guardar</button>
      </div>
    </form>
  </dialog>

  <dialog id="subjectDialog" class="modal-card large-modal">
    <div class="modal-header">
      <h3 id="subjectDialogTitle">Asignatura</h3>
      <button id="closeSubjectDialog" class="icon-button" aria-label="Cerrar">×</button>
    </div>
    <div id="subjectDialogBody"></div>
  </dialog>

  <template id="emptyStateTemplate">
    <div class="empty-state">
      <div aria-hidden="true">◌</div>
      <h3>No hay información registrada todavía</h3>
      <p>Cuando añadas datos, aparecerán aquí ordenados por prioridad.</p>
    </div>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
