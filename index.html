<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#efe9dd">
  <title>GRADUS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="loginScreen" class="login-screen" hidden>
    <section class="login-card" aria-labelledby="loginTitle">
      <div class="login-logo" aria-hidden="true">G</div>
      <p class="login-kicker">Pedagogía UNED</p>
      <h1 id="loginTitle">GRADUS</h1>
      <p class="login-subtitle">Tu escritorio privado de estudio, materiales, calendario y simulacros.</p>
      <form id="loginForm" class="login-form">
        <label>Correo
          <input name="email" type="email" autocomplete="email" required placeholder="tu correo">
        </label>
        <label>Contraseña
          <input name="password" type="password" autocomplete="current-password" minlength="6" required placeholder="contraseña de GRADUS">
        </label>
        <p id="loginMessage" class="form-message" aria-live="polite"></p>
        <button class="main-button" type="submit" name="action" value="login">Entrar</button>
        <button class="text-button" type="submit" name="action" value="signup">Crear cuenta</button>
      </form>
    </section>
  </div>

  <div id="appShell" class="app-shell" hidden>
    <aside class="sidebar" aria-label="Navegación principal">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">G</div>
        <div>
          <h1>GRADUS</h1>
          <p>Curso 2026-2027</p>
        </div>
      </div>
      <nav class="main-nav">
        <button class="nav-link active" data-view="desk">Escritorio</button>
        <button class="nav-link" data-view="subjects">Asignaturas</button>
        <button class="nav-link" data-view="calendar">Calendario</button>
        <button class="nav-link" data-view="simulations">Simulacros</button>
        <button class="nav-link" data-view="settings">Cuenta y avisos</button>
      </nav>
      <button id="signOutBtn" class="quiet-button">Cerrar sesión</button>
    </aside>

    <main class="main-panel">
      <header class="topbar">
        <div>
          <p class="small-label">Entorno personal de aprendizaje</p>
          <h2 id="viewTitle">Escritorio</h2>
        </div>
        <div class="topbar-actions">
          <button id="studyTodayBtn" class="study-button">He estudiado hoy</button>
          <button id="addEventBtn" class="main-button small">Añadir fecha</button>
        </div>
      </header>
      <section id="desk" class="view active-view"></section>
      <section id="subjects" class="view"></section>
      <section id="calendar" class="view"></section>
      <section id="simulations" class="view"></section>
      <section id="settings" class="view"></section>
    </main>
  </div>

  <dialog id="eventDialog" class="dialog">
    <form method="dialog" id="eventForm">
      <div class="dialog-head">
        <h3>Nueva fecha</h3>
        <button class="close-button" value="cancel" aria-label="Cerrar">×</button>
      </div>
      <div class="form-grid">
        <label>Asignatura
          <select name="subjectId" required></select>
        </label>
        <label>Tipo
          <select name="type" required>
            <option value="Entrega">Entrega</option>
            <option value="Examen">Examen</option>
            <option value="Tutoría">Tutoría</option>
            <option value="Estudio">Estudio</option>
            <option value="Otro">Otro</option>
          </select>
        </label>
        <label class="span-2">Título
          <input name="title" type="text" required placeholder="Ej.: entrega PEC, examen primera semana...">
        </label>
        <label>Fecha
          <input name="date" type="date" required>
        </label>
        <label>Aviso
          <select name="notice">
            <option value="7">7 días antes</option>
            <option value="3">3 días antes</option>
            <option value="1">1 día antes</option>
            <option value="0">El mismo día</option>
          </select>
        </label>
        <label class="span-2">Notas
          <textarea name="notes" rows="3" placeholder="Detalles, aula, instrucciones o criterio de entrega"></textarea>
        </label>
      </div>
      <div class="dialog-actions">
        <button class="quiet-button" value="cancel">Cancelar</button>
        <button class="main-button" value="default">Guardar</button>
      </div>
    </form>
  </dialog>

  <dialog id="subjectDialog" class="dialog wide">
    <div class="dialog-head">
      <h3 id="subjectDialogTitle">Asignatura</h3>
      <button id="closeSubjectDialog" class="close-button" aria-label="Cerrar">×</button>
    </div>
    <div id="subjectDialogBody"></div>
  </dialog>

  <dialog id="simulationDialog" class="dialog wide">
    <div class="dialog-head">
      <h3 id="simulationTitle">Simulacro</h3>
      <button id="closeSimulationDialog" class="close-button" aria-label="Cerrar">×</button>
    </div>
    <div id="simulationBody"></div>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="supabase-config.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
